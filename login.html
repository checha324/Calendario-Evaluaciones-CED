<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login y Registro con Firebase</title>
    <link rel="stylesheet" href="styles/login_style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

<div class="login-container">
    <h2>Acceso al Sistema</h2>
    
    <form id="auth-form">
        <input type="email" id="email" placeholder="Correo electrónico" required>
        <input type="password" id="password" placeholder="Contraseña (mín. 6 caracteres)" required>
        
        <!-- Botones separados para Iniciar Sesión o Registrarse -->
        <button type="button" id="btn-login" class="btn-login">Iniciar Sesión</button>
        <button type="button" id="btn-register" class="btn-register">Crear Cuenta Nueva</button>
    </form>

    <div class="divider"></div>

    <button id="btn-google" class="btn-google">Continuar con Google</button>
    
    <p id="mensaje"></p>
</div>

<script type="module" src="js/login_script.js"></script>

</body>
</html>
